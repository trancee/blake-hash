name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-android:
    name: Android (Kotlin/JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        working-directory: android
        run: gradle :lib:test

  test-ios:
    name: iOS (Swift)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        working-directory: ios
        run: swift test --skip Bench
