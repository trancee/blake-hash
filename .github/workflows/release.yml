name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: Android
            os: ubuntu-latest
          - platform: iOS
            os: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        if: matrix.platform == 'Android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: matrix.platform == 'Android'
        uses: gradle/actions/setup-gradle@v5

      - name: Run Kotlin tests
        if: matrix.platform == 'Android'
        working-directory: android
        run: gradle :lib:test

      - name: Run Swift tests
        if: matrix.platform == 'iOS'
        working-directory: ios
        run: swift test

  publish:
    name: Publish to Maven
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts for Maven Central
        working-directory: android
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: gradle :lib:publishMavenPublicationToStagingRepository -PreleaseVersion=${{ steps.version.outputs.VERSION }}

      - name: Publish to Maven Central (Central Portal)
        working-directory: android/lib/build/staging
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          zip -r /tmp/bundle.zip .
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -u "${OSSRH_USERNAME}:${OSSRH_PASSWORD}" \
            -F "bundle=@/tmp/bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")
          echo "Central Portal response (HTTP ${STATUS}):"
          cat /tmp/response.json
          echo
          if [ "${STATUS}" -ne 201 ]; then
            echo "::error::Central Portal upload failed with HTTP ${STATUS}"
            exit 1
          fi

      - name: Publish to GitHub Packages
        working-directory: android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: gradle :lib:publishMavenPublicationToGitHubPackagesRepository -PreleaseVersion=${{ steps.version.outputs.VERSION }}
